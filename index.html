<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Wholesale Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: #ffffff; }
        .bg-navy { background-color: #101D36; }
        .text-navy { color: #101D36; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .logo-bold { font-weight: 900 !important; letter-spacing: 0.05em; font-size: 1.5rem; }
        
        .product-card { border-radius: 15px; background: white; color: #101D36; transition: 0.3s; }

        /* Restoring the Hero Background Style */
        .hero-banner { 
            background: linear-gradient(rgba(16, 29, 54, 0.7), rgba(16, 29, 54, 0.7)), 
                        url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center;
        }

        .cart-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
            background: white; z-index: 100; transition: 0.4s; color: #101D36;
        }
        .cart-drawer.open { right: 0; }
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; z-index: 90;
        }
        .cart-overlay.show { display: block; }
    </style>
</head>
<body>

    <nav class="bg-navy p-4 sticky top-0 z-50 shadow-xl flex justify-between items-center border-b border-gold/20">
        <div>
            <h1 class="logo-bold leading-none uppercase">
                <span class="text-gold">BHAVANI</span> <span class="text-white">MART</span>
            </h1>
            <div class="flex gap-3 mt-1 items-center">
                <p class="text-[9px] font-bold text-white/80 uppercase tracking-widest">+91 9182841682</p>
                <a href="https://maps.app.goo.gl/YourActualLinkHere" target="_blank" class="text-gold text-[9px] font-black underline">📍 VISIT STORE</a>
            </div>
        </div>
        <button onclick="toggleCart()" class="bg-green-600 text-white px-3 py-1.5 rounded-md font-black text-[10px] uppercase shadow-lg">My List</button>
    </nav>

    <section class="hero-banner py-12 text-center text-white px-4 border-b-4 border-gold">
        <h2 class="text-3xl md:text-5xl font-[900] text-gold uppercase tracking-tighter mb-1 leading-none">BHAVANI HYPER MART</h2>
        <p class="text-[10px] md:text-sm font-black text-white tracking-[0.2em] uppercase">KARMANGHAT'S BIGGEST 3000 SQ. FT. STORE</p>
        <p class="text-[9px] mt-2 opacity-80 uppercase font-bold text-white">Near Pochamma Temple, Hyderabad</p>
    </section>

    <div class="p-4 space-y-3 max-w-md mx-auto">
        <a href="https://wa.me/919182841682?text=Hi, sharing my list photo." 
           class="w-full bg-gold text-navy py-3 rounded-full text-[14px] font-[900] flex items-center justify-center gap-2 shadow-2xl uppercase tracking-widest">
            📸 WhatsApp List Photo
        </a>
        <a href="https://maps.app.goo.gl/YourActualLinkHere" 
           class="w-full bg-white text-navy py-3 rounded-full text-[13px] font-[900] flex items-center justify-center gap-2 shadow-2xl uppercase tracking-widest border-2 border-gold">
            📍 Get Directions
        </a>
    </div>

    <div class="bg-navy/50 sticky top-[72px] z-40 p-4 backdrop-blur-md border-b border-white/10">
        <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search items (Rice, Soap, Oil...)" 
               class="w-full bg-white/10 p-3 rounded-xl border border-white/20 text-white text-sm mb-3 outline-none focus:border-gold font-bold">
        <div class="flex gap-2 overflow-x-auto no-scrollbar" id="catFilters">
            <button onclick="setCategory('all')" class="bg-gold text-navy px-5 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap">All Items</button>
        </div>
    </div>

    <main class="p-2 mb-20">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-2">
            </div>
    </main>

    <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="cart-drawer flex flex-col p-6">
        <div class="flex justify-between items-center border-b-2 pb-4 mb-4">
            <h2 class="font-black text-xl uppercase tracking-tighter">My List</h2>
            <button onclick="toggleCart()" class="text-red-600 font-black text-xs uppercase">Close</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto no-scrollbar space-y-3"></div>
        <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase mt-4 shadow-xl">
            Send List to WhatsApp
        </button>
    </div>

    <div onclick="toggleCart()" class="fixed bottom-6 right-6 bg-red-600 text-white p-4 rounded-full shadow-2xl z-[60] cursor-pointer">
        <span id="cartCount" class="absolute -top-1 -right-1 bg-navy text-gold text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-white">0</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        
        let allItems = [];
        let cart = JSON.parse(localStorage.getItem('bhavaniCart')) || [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase() || 'GENERAL', 
                        name: parts[1]?.replace(/"/g, '').trim() || '',
                        img: parts[2]?.replace(/"/g, '').trim() || ''
                    };
                }).filter(i => i.name.length > 1);
                generateCategoryButtons();
                updateCart();
                render();
            } catch (e) { console.error("Error loading data"); }
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('open');
            document.getElementById('cartOverlay').classList.toggle('show');
        }

        function addToCart(id, name) {
            const qtyInput = document.getElementById(`qty-${id}`);
            const qtyVal = qtyInput.value || "1 unit";
            cart.push({ name: name, qty: qtyVal });
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            updateCart();
            
            const btn = event.target;
            btn.innerText = "ADDED ✓";
            setTimeout(() => { btn.innerText = "ADD TO LIST"; }, 800);
            qtyInput.value = "";
        }

        function updateCart() {
            const container = document.getElementById('cartItems');
            document.getElementById('cartCount').innerText = cart.length;
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 mt-10 uppercase text-[10px] font-bold">Your list is empty</p>`;
                return;
            }
            container.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border">
                    <div>
                        <p class="font-black text-[11px] uppercase">${item.name}</p>
                        <p class="text-blue-600 font-bold text-[10px]">Qty: ${item.qty}</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 font-black text-sm">✕</button>
                </div>
            `).join('');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            updateCart();
        }

        function sendOrder() {
            if (cart.length === 0) return;
            let msg = "📦 *NEW ORDER - BHAVANI MART*\n\n";
            cart.forEach((item, i) => msg += `${i+1}. *${item.name}* - (${item.qty})\n`);
            window.location.href = `https://wa.me/919182841682?text=${encodeURIComponent(msg)}`;
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))];
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white/10 text-white border border-white/20 px-4 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap";
                btn.innerText = c;
                btn.onclick = () => setCategory(c);
                container.appendChild(btn);
            });
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map((i, idx) => `
                <div class="product-card p-2 flex flex-col justify-between border h-full shadow-md">
                    <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                         class="h-24 mx-auto object-contain mb-1">
                    <div class="text-center">
                        <p class="text-[8px] font-bold text-blue-600 uppercase mb-0.5">${i.category}</p>
                        <h4 class="text-[11px] font-[900] uppercase h-7 overflow-hidden leading-tight mb-2">${i.name}</h4>
                        
                        <div class="space-y-1">
                            <div class="flex items-center bg-slate-100 rounded-lg border border-slate-200">
                                <span class="text-[8px] font-black px-2 text-slate-400">QTY</span>
                                <input type="text" id="qty-prod-${idx}" placeholder="e.g. 2kg" 
                                       class="w-full bg-transparent p-1.5 text-[10px] font-bold outline-none">
                            </div>
                            <button onclick="addToCart('prod-${idx}', '${i.name.replace(/'/g, "\\'")}')" 
                                    class="w-full bg-navy text-gold py-2 rounded-lg text-[10px] font-black uppercase shadow-sm">
                                Add to List
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(c) { activeCat = c; render(); }
        loadData();
    </script>
</body>
</html>
