<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Wholesale Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; color: #101D36; }
        .bg-navy { background-color: #101D36; }
        .text-navy { color: #101D36; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .logo-bold { font-weight: 900 !important; letter-spacing: 0.05em; font-size: 1.8rem; }
        
        .hero-banner { 
            background: linear-gradient(rgba(16, 29, 54, 0.8), rgba(16, 29, 54, 0.8)), 
                        url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center;
        }
        .offer-card { border: 3px solid #FFD700; background: #ffffff; border-radius: 20px; min-width: 160px; }
        .product-card { border-top: 4px solid #FFD700; border-radius: 15px; background: white; transition: 0.3s; }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .highlight-banner { animation: pulse-soft 3s infinite ease-in-out; }
    </style>
</head>
<body>

    <div class="bg-red-600 text-white py-4 text-center text-sm md:text-xl font-black uppercase tracking-widest shadow-2xl highlight-banner">
        🔥 SPECIAL DISCOUNT ON EVERY ITEM • BELOW MRP 🔥
    </div>

    <nav class="bg-navy p-5 sticky top-0 z-50 shadow-xl flex justify-between items-center">
        <div>
            <h1 class="logo-bold leading-none uppercase">
                <span class="text-gold">BHAVANI</span> <span class="text-white">MART</span>
            </h1>
            <p class="text-[11px] font-bold text-white opacity-90 uppercase tracking-[0.1em] mt-1">+91 9182841682</p>
        </div>
        <a href="https://wa.me/919182841682?text=Hi%20Bhavani%20Mart,%20I%20would%20like%20to%20place%20an%20order." class="bg-green-600 text-white px-5 py-2 rounded-md font-black text-[12px] shadow-lg uppercase">Order Now</a>
    </nav>

    <div id="offerSection" class="hidden">
        <div class="bg-gold p-8 border-b-4 border-navy">
            <h2 class="text-[#101D36] font-black text-xl uppercase tracking-tighter mb-4 text-center">
                <span class="opacity-100">★</span> TODAY'S EXCLUSIVE OFFERS <span class="opacity-100">★</span>
            </h2>
            <div id="offersGrid" class="flex gap-4 overflow-x-auto no-scrollbar py-2"></div>
        </div>
    </div>

    <section class="hero-banner py-24 text-center text-white px-4 border-b-4 border-gold">
        <h2 class="text-5xl md:text-7xl font-[900] text-gold uppercase tracking-tighter mb-2">
            BHAVANI HYPER MART
        </h2>
        <p class="text-lg md:text-xl font-black text-white tracking-[0.2em] uppercase">
            3000 SQ. FT. WHOLESALE STORE
        </p>
    </section>

    <div class="bg-navy p-14 text-center border-y-4 border-gold">
        <h3 class="text-gold font-black text-2xl md:text-4xl mb-8 uppercase tracking-tight leading-tight">
            TIRED OF TYPING?<br> TAKE A PHOTO OF YOUR LIST!
        </h3>
        <a href="https://wa.me/919182841682?text=Hi%20Bhavani%20Mart,%20I%20have%20attached%20a%20photo%20of%20my%20grocery%20list." class="bg-gold text-navy px-12 py-5 rounded-full text-[16px] font-black inline-block shadow-2xl uppercase tracking-widest hover:scale-105 transition-transform">
            WHATSAPP LIST PHOTO
        </a>
    </div>

    <div class="bg-white sticky top-[88px] z-40 border-b p-4 shadow-md text-center">
        <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search items (Rice, Soap, Oil...)" class="w-full bg-slate-100 p-4 rounded-xl border-2 border-slate-200 text-sm mb-4 outline-none focus:border-navy font-bold">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="catFilters">
            <button onclick="setCategory('all')" class="bg-navy text-gold px-6 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap">All Items</button>
        </div>
    </div>

    <main class="container mx-auto p-4 py-8 mb-20">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        
        let allItems = [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    const rawPrice = parts[3]?.replace(/"/g, '').trim() || '';
                    let mrp = '', offer = rawPrice;

                    if (rawPrice.includes('/')) {
                        const splitPrice = rawPrice.split('/');
                        mrp = splitPrice[0].trim();
                        offer = splitPrice[1].trim();
                    }

                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase(), 
                        name: parts[1]?.replace(/"/g, '').trim(),
                        img: parts[2]?.replace(/"/g, '').trim(),
                        mrp: mrp,
                        offer: offer
                    };
                }).filter(i => i.name && i.name.length > 1);

                renderOffers();
                generateCategoryButtons();
                render();
            } catch (e) { console.error("Data error"); }
        }

        // UPDATED: Removed Rupee Symbol
        function formatPriceHTML(mrp, offer) {
            if (mrp) {
                return `<span class="text-slate-400 line-through text-[11px] font-bold mr-2">${mrp}</span>
                        <span class="text-red-600 font-black text-lg">${offer}</span>`;
            }
            return `<span class="text-navy font-black text-lg">${offer}</span>`;
        }

        // UPDATED: Dynamic WhatsApp Messaging for Offers
        function renderOffers() {
            const offers = allItems.filter(i => i.category.includes('TODAY OFFER'));
            const section = document.getElementById('offerSection');
            const grid = document.getElementById('offersGrid');

            if (offers.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = offers.map(i => {
                    const waMessage = encodeURIComponent(`Hi Bhavani Mart, I want to grab the deal on ${i.name} priced at ${i.offer}.`);
                    return `
                    <div class="offer-card p-4 shadow-lg text-center flex flex-col justify-between">
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'"
                             class="h-24 mx-auto object-contain mb-2">
                        <h4 class="text-[11px] font-black text-navy uppercase h-8 overflow-hidden">${i.name}</h4>
                        <div class="my-2">${formatPriceHTML(i.mrp, i.offer)}</div>
                        <a href="https://wa.me/919182841682?text=${waMessage}" class="block bg-navy text-gold text-[10px] py-2 rounded-lg font-black uppercase">Grab Deal</a>
                    </div>
                `}).join('');
            }
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))].filter(c => c && !c.includes("TODAY OFFER"));
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-navy border-2 border-slate-200 px-5 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap";
                btn.innerText = c;
                btn.onclick = () => setCategory(c);
                container.appendChild(btn);
            });
        }

        // UPDATED: Dynamic WhatsApp Messaging for Products
        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map(i => {
                const waMessage = encodeURIComponent(`order ${i.name} from the ${i.category} section.`);
                return `
                <div class="product-card shadow-lg p-4 flex flex-col justify-between border">
                    <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'"
                         class="h-32 object-contain mb-3">
                    <div>
                        <p class="text-[9px] font-black text-blue-600 uppercase mb-1 opacity-70">${i.category}</p>
                        <h4 class="text-[12px] font-black text-navy uppercase h-8 overflow-hidden mb-2">${i.name}</h4>
                        <div class="mb-4">${formatPriceHTML(i.mrp, i.offer)}</div>
                        <a href="https://wa.me/919182841682?text=${waMessage}" class="block bg-navy text-gold py-3 rounded-lg text-[11px] font-black text-center uppercase">Order Now</a>
                    </div>
                </div>
            `}).join('');
        }

        function setCategory(c) { activeCat = c; render(); }
        loadData();
    </script>
</body>
</html>
