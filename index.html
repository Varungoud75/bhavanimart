<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Wholesale Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; color: #003366; }
        .bg-navy { background-color: #003366; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Logo needs weight 900 for extra bold */
        .logo-text { font-weight: 900 !important; letter-spacing: -0.05em; }
        .hero-banner { 
            background: linear-gradient(rgba(0,51,102,0.85), rgba(0,51,102,0.85)), url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
        }
        .offer-card { border: 3px solid #FFD700; background: #ffffff; border-radius: 20px; min-width: 160px; }
        .product-card { border-top: 4px solid #FFD700; border-radius: 15px; background: white; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="bg-red-600 text-white py-2 text-center text-[10px] font-900 uppercase tracking-widest">
        🔥 SPECIAL DISCOUNT ON EVERY ITEM • BELOW MRP 🔥
    </div>

    <nav class="bg-navy p-4 sticky top-0 z-50 shadow-xl flex justify-between items-center">
        <div>
            <h1 class="text-2xl logo-text text-gold leading-none uppercase tracking-tighter">BHAVANI MART</h1>
            <p class="text-[10px] font-bold text-white opacity-80 uppercase tracking-widest mt-1">+91 9182841682</p>
        </div>
        <a href="https://wa.me/919182841682" class="bg-green-500 text-white px-4 py-2 rounded-md font-900 text-[11px] shadow-lg uppercase">Order Now</a>
    </nav>

    <div id="offerSection" class="hidden">
        <div class="bg-gold p-6 border-b-4 border-navy">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-navy font-900 text-sm uppercase tracking-tighter">🌟 TODAY'S EXCLUSIVE OFFERS</h2>
                <span class="bg-red-600 text-white text-[9px] px-2 py-1 rounded font-900 animate-pulse">LIVE DEALS</span>
            </div>
            <div id="offersGrid" class="flex gap-4 overflow-x-auto no-scrollbar py-2"></div>
        </div>
    </div>

    <section class="hero-banner py-12 text-center text-white px-4 border-b-4 border-gold">
        <h2 class="text-2xl font-900 text-gold uppercase tracking-tight">BHAVANI HYPER MART</h2>
        <p class="text-xs font-bold tracking-[0.2em] opacity-90 uppercase mt-2">Karmanghat's Biggest 3000 Sq. Ft. Store</p>
    </section>

    <div class="bg-navy p-8 text-center border-y-4 border-gold">
        <h3 class="text-gold font-900 text-base mb-4 uppercase tracking-tight">Tired of typing? Take a photo of your list!</h3>
        <a href="https://wa.me/919182841682" class="bg-gold text-navy px-12 py-4 rounded-xl text-[12px] font-900 inline-block shadow-2xl uppercase tracking-tighter">WhatsApp List Photo</a>
    </div>

    <div class="bg-white sticky top-[76px] z-40 border-b p-4 shadow-md text-center">
        <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search items (Rice, Soap, Oil)..." class="w-full bg-slate-100 p-4 rounded-xl border-2 border-slate-200 text-sm mb-4 outline-none focus:border-navy font-bold">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="catFilters">
            <button onclick="setCategory('all')" class="bg-navy text-gold px-6 py-2 rounded-lg text-[10px] font-900 uppercase whitespace-nowrap">All Items</button>
        </div>
    </div>

    <main class="container mx-auto p-4 py-8 mb-20">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        
        let allItems = [];
        let activeCat = 'all';

        // MAGIC FIX: Converts Google Drive links to Direct Image links
        function fixImageUrl(url) {
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0];
                return `https://lh3.googleusercontent.com/u/0/d/${id}`;
            }
            return url;
        }

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    const rawPrice = parts[3]?.replace(/"/g, '').trim() || '';
                    let mrp = '', offer = rawPrice;

                    if (rawPrice.includes('/')) {
                        const splitPrice = rawPrice.split('/');
                        mrp = splitPrice[0].trim();
                        offer = splitPrice[1].trim();
                    }

                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase(), 
                        name: parts[1]?.replace(/"/g, '').trim(),
                        // Apply the image fix here
                        img: fixImageUrl(parts[2]?.replace(/"/g, '').trim() || ''),
                        mrp: mrp,
                        offer: offer
                    };
                }).filter(i => i.name && i.name.length > 1);

                renderOffers();
                generateCategoryButtons();
                render();
            } catch (e) { console.error("Data error"); }
        }

        function formatPriceHTML(mrp, offer) {
            if (mrp && mrp !== "") {
                return `<span class="text-slate-400 line-through text-[10px] font-bold mr-2">₹${mrp}</span>
                        <span class="text-red-600 font-900 text-sm">₹${offer}</span>`;
            }
            return `<span class="text-navy font-900 text-sm">₹${offer || 'Best Price'}</span>`;
        }

        function renderOffers() {
            const offers = allItems.filter(i => i.category === 'TODAY OFFER\'S' || i.category === 'TODAY OFFERS');
            const section = document.getElementById('offerSection');
            const grid = document.getElementById('offersGrid');

            if (offers.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = offers.map(i => `
                    <div class="offer-card p-4 shadow-lg text-center flex flex-col justify-between">
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'"
                             class="h-24 mx-auto object-contain mb-2">
                        <h4 class="text-[10px] font-900 text-navy uppercase leading-tight h-8 overflow-hidden">${i.name}</h4>
                        <div class="my-2">${formatPriceHTML(i.mrp, i.offer)}</div>
                        <a href="https://wa.me/919182841682?text=Order Offer: ${i.name}" class="block bg-navy text-gold text-[9px] py-1.5 rounded-lg font-900 uppercase">Grab Deal</a>
                    </div>
                `).join('');
            }
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))].filter(c => c && !c.includes("TODAY OFFER"));
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-navy border-2 border-slate-200 px-5 py-2 rounded-lg text-[10px] font-900 uppercase whitespace-nowrap shadow-sm";
                btn.innerText = c;
                btn.onclick = () => setCategory(c);
                container.appendChild(btn);
            });
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map(i => `
                <div class="product-card shadow-lg p-4 flex flex-col justify-between border border-slate-100">
                    <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'"
                         class="h-32 object-contain mb-3">
                    <div>
                        <p class="text-[8px] font-900 text-blue-500 uppercase tracking-widest mb-1 opacity-70">${i.category}</p>
                        <h4 class="text-[11px] font-900 text-navy uppercase leading-tight mb-2 h-8 overflow-hidden">${i.name}</h4>
                        <div class="mb-4">${formatPriceHTML(i.mrp, i.offer)}</div>
                        <a href="https://wa.me/919182841682?text=Order: ${i.name}" class="block bg-navy text-gold py-3 rounded-lg text-[10px] font-900 text-center uppercase">Order Now</a>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(c) { activeCat = c; render(); }
        loadData();
    </script>
</body>
</html>
