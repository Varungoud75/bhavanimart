<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Karmanghat Quick-Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: #ffffff; margin: 0; }
        .bg-navy { background-color: #101D36; }
        .text-navy { color: #101D36; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modern Product Card Styling like Blinkit */
        .product-card {
            border-radius: 15px; background: white; color: #101D36;
            transition: 0.3s;
        }

        .hero-banner { 
            background: linear-gradient(rgba(16, 29, 54, 0.6), rgba(16, 29, 54, 0.6)), 
                        url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
        }

        /* Cart Drawer Styles */
        .cart-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
            background: white; z-index: 100; transition: 0.4s; color: #101D36;
        }
        .cart-drawer.open { right: 0; }
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; z-index: 90;
        }
        .cart-overlay.show { display: block; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-navy p-4 flex justify-between items-center border-b border-gold/20 shadow-xl">
        <div>
            <h1 class="font-[900] text-xl leading-none uppercase tracking-widest">
                <span class="text-gold">BHAVANI</span> <span class="text-white">MART</span>
            </h1>
            <div class="flex items-center gap-2 mt-2">
                <p class="text-[9px] font-bold text-white/80 uppercase tracking-widest">+91 9182841682</p>
                <a href="#" class="inline-flex items-center bg-white text-navy px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter shadow-sm">
                    <span class="mr-1">📍</span> VISIT STORE
                </a>
            </div>
        </div>
        <button onclick="toggleCart()" class="bg-green-600 text-white px-3 py-1.5 rounded-md font-black text-[10px] uppercase shadow-lg">My List</button>
    </nav>

    <section class="hero-banner py-12 text-center text-white px-4">
        <h2 class="text-3xl font-[900] text-gold uppercase tracking-tighter mb-1 leading-none">BHAVANI HYPER MART</h2>
        <p class="text-[10px] font-black text-white tracking-[0.2em] uppercase">KARMANGHAT'S BIGGEST 3000 SQ. FT. STORE</p>
    </section>

    <div class="bg-red-600 p-2 text-center">
        <p class="animate-pulse text-white font-[900] text-[11px] uppercase tracking-tighter leading-none">
            🔥 SPECIAL DISCOUNT ON EVERY ITEM! VISIT TODAY & SAVE BIG! 🔥
        </p>
    </div>

    <div class="p-6 text-center space-y-4 max-w-md mx-auto">
        <h3 class="text-white font-black text-lg uppercase tracking-tight leading-tight">
            <span class="text-gold">TIRED OF TYPING?</span><br>
            TAKE A PHOTO OF YOUR LIST!
        </h3>
        <div class="grid grid-cols-2 gap-3">
            <a href="https://wa.me/919182841682" class="bg-gold text-navy py-3 rounded-full text-[10px] font-[900] flex items-center justify-center gap-2 uppercase tracking-widest shadow-xl">📸 WhatsApp</a>
            <a href="#" class="bg-white text-navy py-3 rounded-full text-[10px] font-[900] flex items-center justify-center gap-2 uppercase tracking-widest border-2 border-gold shadow-xl">📍 Directions</a>
        </div>
    </div>

    <div class="px-4 py-8 bg-slate-50 text-navy border-t">
        <h3 class="font-black text-xs text-navy uppercase mb-5 tracking-widest text-center">Today's Special Offers</h3>
        
        <div class="flex gap-4 overflow-x-auto no-scrollbar pb-6" id="swiggyOfferGrid">
            <div class="min-w-[135px] h-36 bg-slate-100 rounded-xl animate-pulse"></div>
            <div class="min-w-[135px] h-36 bg-slate-100 rounded-xl animate-pulse"></div>
        </div>
    </div>

    <main class="p-4 mb-32 bg-slate-50 text-navy">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full z-50 bg-navy p-4 border-t border-white/10 shadow-2xl">
        <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search 10,000+ items..." 
               class="w-full bg-white/10 p-3 rounded-xl border border-white/20 text-white text-sm mb-3 outline-none focus:border-gold font-bold">
        <div class="flex gap-2 overflow-x-auto no-scrollbar" id="catFilters">
            <button onclick="setCategory('all')" id="cat-all" class="bg-gold text-navy px-5 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap">All Items</button>
        </div>
    </div>

    <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="cart-drawer flex flex-col p-6">
        <div class="flex justify-between items-center border-b-2 pb-4 mb-4">
            <h2 class="font-black text-xl uppercase tracking-tighter">My List</h2>
            <button onclick="toggleCart()" class="text-red-600 font-black text-xs uppercase">Close</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto no-scrollbar space-y-3"></div>
        <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase mt-4 shadow-xl">
            Send List to WhatsApp
        </button>
    </div>

    <div onclick="toggleCart()" class="fixed bottom-32 right-6 bg-red-600 text-white p-4 rounded-full shadow-2xl z-[60] cursor-pointer">
        <span id="cartCount" class="absolute -top-1 -right-1 bg-navy text-gold text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-white">0</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        
        let allItems = [];
        let cart = JSON.parse(localStorage.getItem('bhavaniCart')) || [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase() || 'GENERAL', 
                        name: parts[1]?.replace(/"/g, '').trim() || '',
                        img: parts[2]?.replace(/"/g, '').trim() || '',
                        price: parts[3]?.replace(/"/g, '').trim() || '',
                        mrp: parts[4]?.replace(/"/g, '').trim() || ''
                    };
                }).filter(i => i.name.length > 1);
                
                generateCategoryButtons();
                renderOffers();
                updateCart();
                render();
            } catch (e) { console.error("Data error"); }
        }

        function renderOffers() {
            const offerItems = allItems.filter(i => i.category.includes('OFFER')).slice(0, 3);
            const grid = document.getElementById('swiggyOfferGrid');
            if (offerItems.length > 0) {
                grid.innerHTML = offerItems.map((i, idx) => `
                    <div class="min-w-[135px] bg-white rounded-xl p-2 shadow-md text-navy flex flex-col">
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" class="h-16 mx-auto object-contain mb-1">
                        <h4 class="text-[9px] font-black uppercase text-center my-1 h-6 overflow-hidden">${i.name}</h4>
                        
                        <div class="flex justify-center gap-2 mb-2">
                            <span class="text-[11px] font-[900] text-navy">₹${i.price}</span>
                            <span class="text-[9px] text-slate-400 line-through font-bold">₹${i.mrp}</span>
                        </div>

                        <button onclick="addToCart('off-${idx}', '${i.name}')" class="w-full bg-red-600 text-white py-1.5 rounded-lg text-[9px] font-black uppercase">Add</button>
                    </div>
                `).join('');
            }
        }

        // --- Cart Functions ---
        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('open');
            document.getElementById('cartOverlay').classList.toggle('show');
        }

        function addToCart(id, name) {
            const isOffer = id.startsWith('off');
            const qtyVal = "1 unit"; // Simplified for demonstration
            cart.push({ name: name, qty: qtyVal });
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 mt-10 uppercase text-[10px] font-bold">Your list is empty</p>`;
                return;
            }
            container.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-slate-100 p-3 rounded-xl border text-navy">
                    <div>
                        <p class="font-black text-[10px] uppercase tracking-tighter">${item.name}</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 font-black px-2">✕</button>
                </div>
            `).join('');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            updateCart();
        }

        function sendOrder() {
            if (cart.length === 0) return;
            let msg = "📦 *BHAVANI MART - ORDER LIST*\n\n" + cart.map((item, i) => `${i+1}. *${item.name}*`).join('\n');
            window.location.href = `https://wa.me/919182841682?text=${encodeURIComponent(msg)}`;
        }

        // --- Grid & Category Functions ---
        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))].filter(c => !c.includes('OFFER'));
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white/10 text-white border border-white/20 px-4 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap";
                btn.innerText = c;
                btn.onclick = () => setCategory(c);
                container.appendChild(btn);
            });
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => !i.category.includes('OFFER') && (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center text-slate-400 uppercase py-10 font-bold text-xs tracking-widest">No items found</div>';
                return;
            }

            grid.innerHTML = filtered.map((i, idx) => `
                <div class="product-card p-3 flex flex-col border shadow-lg">
                    <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" class="h-20 mx-auto object-contain">
                    <div class="text-center">
                        <p class="text-[7px] font-bold text-blue-600 uppercase mb-0.5">${i.category}</p>
                        <h4 class="text-[10px] font-[900] uppercase h-7 overflow-hidden leading-tight mb-2">${i.name}</h4>
                        <button onclick="addToCart('prod-${idx}', '${i.name.replace(/'/g, "\\'")}')" class="w-full bg-navy text-gold py-1.5 rounded-lg text-[9px] font-black uppercase tracking-tight shadow-sm">Add</button>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(c) {
            activeCat = c;
            const filters = document.getElementById('catFilters').getElementsByTagName('button');
            for(let f of filters) f.className = f.className.replace('bg-gold text-navy', 'bg-white/10 text-white');
            event.target.className = event.target.className.replace('bg-white/10 text-white', 'bg-gold text-navy');
            render();
        }

        loadData();
    </script>
</body>
</html>
