<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Grocery Delivered in Minutes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        /* Zepto-inspired Colors */
        .bg-zepto-purple { background-color: #3c006b; }
        .text-zepto-purple { color: #3c006b; }
        .bg-zepto-pink { background-color: #ff3366; }
        .sticky-search { position: sticky; top: 0; z-index: 50; }
        .discount-badge { background: linear-gradient(45deg, #ff3366, #ff00cc); }
        .product-card { border-radius: 16px; transition: all 0.2s ease; }
        .product-card:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div class="bg-zepto-purple text-white py-2 px-4 text-center">
        <p class="text-[10px] md:text-xs font-bold tracking-tight">
            <span class="text-yellow-300 italic">OFFER:</span> DISCOUNT ON EVERY MRP ITEM | FREE DELIVERY ABOVE ₹1,000
        </p>
    </div>

    <header class="bg-white p-4 shadow-sm border-b">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-zepto-purple text-white w-10 h-10 rounded-xl flex items-center justify-center font-black text-xl italic shadow-md">B</div>
                <div>
                    <h1 class="text-xl font-black text-zepto-purple tracking-tighter leading-none italic">BHAVANI MART</h1>
                    <p class="text-[9px] font-bold text-gray-400 mt-1 uppercase">Karmanghat • H NO 8-1-12/G1</p>
                </div>
            </div>
            <a href="https://wa.me/919182841682" class="bg-zepto-pink text-white px-4 py-2 rounded-full font-black text-[10px] shadow-lg animate-pulse">
                ORDER NOW
            </a>
        </div>
    </header>

    <div class="bg-white p-4 sticky-search border-b shadow-sm">
        <div class="container mx-auto relative">
            <input type="text" id="itemSearch" onkeyup="filterItems()" placeholder="Search for 'Rice', 'Milk' or 'Soap'..." class="w-full bg-gray-100 p-3 pl-10 rounded-xl outline-none focus:ring-2 focus:ring-purple-200 text-sm border border-gray-100">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        </div>
    </div>

    <div class="bg-white py-4 overflow-x-auto whitespace-nowrap px-4 border-b no-scrollbar">
        <div class="container mx-auto flex gap-4">
            <button onclick="setCategory('all')" class="bg-zepto-purple text-white px-4 py-2 rounded-full text-xs font-bold">All</button>
            <button onclick="setCategory('LEGUMES')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-full text-xs font-bold">Dals</button>
            <button onclick="setCategory('SPICES')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-full text-xs font-bold">Spices</button>
            <button onclick="setCategory('DAIRY')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-full text-xs font-bold">Dairy</button>
            <button onclick="setCategory('CLEANING PRODUCTS')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-full text-xs font-bold">Cleaning</button>
        </div>
    </div>

    <section class="py-6 container mx-auto px-4">
        <h3 class="text-lg font-black mb-4 flex items-center gap-2">
            <i class="fas fa-bolt text-yellow-500"></i> Deals for You
        </h3>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
            </div>
    </section>

    <footer class="bg-white mt-10 p-8 border-t">
        <div class="container mx-auto text-center">
            <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100 inline-block max-w-sm w-full">
                <h4 class="font-black text-zepto-purple mb-2">BHAVANI HYPER MART</h4>
                <p class="text-xs text-gray-500 leading-relaxed mb-4">
                    Narayana Heights, Kranthi Nagar, <br>
                    Karmanghat, Hyderabad - 500079
                </p>
                <a href="tel:+919182841682" class="text-zepto-purple font-black block border-t pt-4">
                    <i class="fas fa-phone-alt mr-2"></i> +91 9182841682
                </a>
            </div>
            <p class="mt-8 text-[9px] text-gray-400 font-bold uppercase tracking-widest">&copy; 2026 Bhavani Mart Hypermarket</p>
        </div>
    </footer>

    <script>
        const whatsappNumber = "919182841682";
        let currentCategory = 'all';

        const products = [
            { category: "LEGUMES", item: "TOOR DAL" }, { category: "LEGUMES", item: "MASOOR DAL" },
            { category: "LEGUMES", item: "CHANA DAL" }, { category: "LEGUMES", item: "URAD DAL" },
            { category: "SPICES", item: "CUMIN SEEDS" }, { category: "SPICES", item: "BLACK MUSTARD" },
            { category: "DAIRY", item: "MILK" }, { category: "DAIRY", item: "BUTTER" },
            { category: "DAIRY", item: "CHEESE" }, { category: "KITCHEN", item: "NAPKINS" },
            { category: "KITCHEN", item: "ALUMINUM FOIL" }, { category: "PERSONAL CARE", item: "SOAP" },
            { category: "PERSONAL CARE", item: "SHAMPOO" }, { category: "CLEANING PRODUCTS", item: "DETERGENT" }
            // Add other items here...
        ];

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white p-3 product-card shadow-sm border border-gray-100 flex flex-col justify-between relative overflow-hidden">
                    <div class="absolute top-0 right-0 discount-badge text-[8px] text-white px-2 py-1 font-black rounded-bl-lg">OFFER</div>
                    <div class="h-24 bg-gray-50 rounded-xl mb-3 flex items-center justify-center text-gray-200">
                        <i class="fas fa-box-open text-3xl"></i>
                    </div>
                    <div>
                        <h4 class="text-[11px] font-bold text-gray-800 leading-tight h-8 overflow-hidden uppercase">${p.item}</h4>
                        <p class="text-[10px] text-gray-400 font-bold mt-1">${p.category}</p>
                    </div>
                    <div class="mt-3 flex justify-between items-center">
                        <div>
                            <p class="text-[8px] text-gray-400 line-through">MRP ₹00</p>
                            <p class="text-xs font-black text-zepto-purple">LOWER PRICE</p>
                        </div>
                        <a href="https://wa.me/${whatsappNumber}?text=Price%20check%20for%20${p.item}" class="bg-white border border-zepto-pink text-zepto-pink px-3 py-1 rounded-lg text-[10px] font-black hover:bg-zepto-pink hover:text-white transition">
                            ADD
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            filterItems();
        }

        function filterItems() {
            const s = document.getElementById('itemSearch').value.toLowerCase();
            const f = products.filter(p => (currentCategory === 'all' || p.category === currentCategory) && p.item.toLowerCase().includes(s));
            renderProducts(f);
        }

        renderProducts(products);
    </script>
</body>
</html>
