<!DOCTYPE html>

<body class="bg-gray-50 font-sans">

 <nav class="bg-brand-blue text-white p-3 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tighter uppercase leading-none">BHAVANI <span class="text-yellow-400">MART</span></h1>
                <p class="text-[10px] md:text-xs text-yellow-400 font-bold mt-1">
                    <i class="fas fa-phone-alt"></i> +91 9182841682

            </div>
            <a href="https://wa.me/919182841682" class="bg-green-500 hover:bg-green-600 px-3 py-2 rounded-lg text-[10px] font-bold shadow-md transition flex items-center gap-1">
                <i class="fab fa-whatsapp text-sm"></i> ORDER NOW

        </div>
    </nav>

    <header class="hero-gradient h-[250px] flex items-center justify-center text-center text-white px-4">

    <div class="bg-white shadow-md p-4 sticky-search">
        <div class="container mx-auto flex flex-col md:flex-row gap-4">
            <input type="text" id="itemSearch" onkeyup="filterItems()" placeholder="Search 10,000+ items (e.g. Rice, Dal, Soap)..." class="flex-grow p-3 border-2 border-blue-100 rounded-xl focus:border-blue-500 outline-none">
            <select id="categoryFilter" onchange="filterItems()" class="p-3 border-2 border-blue-100 rounded-xl bg-white font-bold text-blue-900">
                <option value="all">All Categories</option>
                <option value="KITCHEN">Kitchen</option>
                <option value="SPICES">Spices</option>
                <option value="DRINKS">Drinks</option>
                <option value="DAIRY">Dairy</option>
                <option value="LEGUMES">Legumes</option>
                <option value="STATIONERY">Stationery</option>
                <option value="PERSONAL CARE">Personal Care</option>
                <option value="CLEANING PRODUCTS">Cleaning Products</option>
            </select>
        </div>
    </div>

    <section class="py-6 bg-yellow-400 text-blue-900">
        <div class="container mx-auto px-4 text-center">
            <h3 class="font-bold text-lg mb-2">Tired of typing? Take a photo of your list!</h3>
            <a href="https://wa.me/91918241682?text=Hi, I am sending my grocery list photo" class="inline-block bg-blue-900 text-white px-6 py-2 rounded-lg font-bold">
                <i class="fas fa-upload mr-2"></i> WhatsApp List Photo
            </a>
        </div>
    </section>

    <section class="py-10 container mx-auto px-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </section>

    <script>
        const products = [
            { category: "KITCHEN", item: "NAPKINS", price: "" },
            { category: "KITCHEN", item: "NON STICK SPRAY", price: "" },
            { category: "KITCHEN", item: "WAX PAPER", price: "" },
            { category: "KITCHEN", item: "ALUMINUM FOIL", price: "" },
            { category: "KITCHEN", item: "PAPER TOWELS", price: "" },
            { category: "SPICES", item: "CUMIN SEEDS", price: "" },
            { category: "SPICES", item: "NUTMEG (JAIPHAL)", price: "" },
            { category: "SPICES", item: "MACE (JAVITRI)", price: "" },
            { category: "SPICES", item: "BAY LEAVES (TEJ PATTA)", price: "" },
            { category: "SPICES", item: "BLACK MUSTARD", price: "" },
            { category: "DRINKS", item: "SODA", price: "" },
            { category: "DRINKS", item: "WATER", price: "" },
            { category: "DRINKS", item: "JUICE", price: "" },
            { category: "DRINKS", item: "COFFEE", price: "" },
            { category: "DAIRY", item: "BUTTER", price: "" },

            { category: "LEGUMES", item: "TOOR DAL", price: "" },

            { category: "LEGUMES", item: "RAJMA", price: "" },
            { category: "LEGUMES", item: "PEANUTS", price: "" },

            { category: "LEGUMES", item: "MOONG DAL", price: "" },
            { category: "LEGUMES", item: "CHANA DAL", price: "" },
            { category: "STATIONERY", item: "FILES", price: "" },

        ];

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            const whatsappNumber = "919182841682"; // REPLACE WITH YOUR BROTHER'S NUMBER
            
            grid.innerHTML = items.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent transition product-card flex flex-col justify-between">
                    <div>
                        <div class="text-[10px] font-bold text-blue-500 uppercase">${p.category}</div>
                        <h4 class="font-bold text-gray-800 text-sm md:text-base leading-tight mt-1">${p.item}</h4>
                    </div>
                    <div class="mt-4">
                        <div class="text-green-600 font-bold text-sm mb-2">${p.price || 'Price: Ask Store'}</div>
                        <a href="https://wa.me/${whatsappNumber}?text=Price check for ${p.item}" class="block text-center text-xs bg-blue-50 text-blue-600 py-1 rounded-md border border-blue-100">
                            Check Price
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function filterItems() {
            const search = document.getElementById('itemSearch').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const filtered = products.filter(p => (cat === 'all' || p.category === cat) && p.item.toLowerCase().includes(search));
            renderProducts(filtered);
        }

        renderProducts(products);
    </script>
</body>
</html>
