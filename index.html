<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Premium Hypermarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        .font-logo { font-family: 'Playfair Display', serif; }
        .font-main { font-family: 'Montserrat', sans-serif; }
        .bg-premium-green { background-color: #004d40; }
        .discount-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { background-color: #e31e24; } 50% { background-color: #ff5252; } 100% { background-color: #e31e24; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .admin-panel { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-main">

    <div class="discount-pulse text-white py-2 text-center text-[11px] font-black uppercase tracking-tighter">
        🔥🔥 SPECIAL DISCOUNT ON EVERY ITEM IN STORE TODAY! 🔥🔥
    </div>

    <nav class="bg-white p-5 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-logo text-premium-green italic leading-none">Bhavani</h1>
                <h2 class="text-xl font-main text-red-600 font-black tracking-[.25em] -mt-1">MART</h2>
            </div>
            <a href="https://wa.me/919182841682" class="bg-green-600 text-white px-4 py-2 rounded-lg font-black text-xs flex items-center gap-2 shadow-lg">
                <i class="fab fa-whatsapp text-lg"></i> ORDER
            </a>
        </div>
    </nav>

    <div class="bg-premium-green p-4">
        <div class="container mx-auto">
            <p class="text-white text-[10px] text-center mb-3 opacity-80 uppercase tracking-widest font-bold">Karmanghat • H NO 8-1-12/G1 • Near Pochamma Temple</p>
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="itemSearch" onkeyup="filterItems()" placeholder="Search 10,000+ Products..." class="w-full p-4 rounded-full border-none shadow-inner text-sm focus:ring-4 focus:ring-yellow-400">
                <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>
        </div>
    </div>

    <div class="bg-yellow-100 p-3 border-b border-yellow-200">
        <p class="text-center text-xs font-black text-yellow-800">
            <i class="fas fa-truck-fast mr-2"></i> FREE HOME DELIVERY (ORDERS > ₹1000)
        </p>
    </div>

    <div class="bg-white py-4 overflow-x-auto whitespace-nowrap px-4 no-scrollbar border-b">
        <div class="flex gap-2">
            <button onclick="setCategory('all')" class="bg-black text-white px-5 py-2 rounded-full text-[10px] font-black uppercase">All</button>
            <button onclick="setCategory('GROCERY')" class="bg-gray-100 text-gray-800 px-5 py-2 rounded-full text-[10px] font-black uppercase">Grocery</button>
            <button onclick="setCategory('SPICES')" class="bg-gray-100 text-gray-800 px-5 py-2 rounded-full text-[10px] font-black uppercase">Spices</button>
            <button onclick="setCategory('CLEANING')" class="bg-gray-100 text-gray-800 px-5 py-2 rounded-full text-[10px] font-black uppercase">Cleaning</button>
        </div>
    </div>

    <main class="container mx-auto p-4 mb-20">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </main>

    <footer class="bg-white border-t p-10">
        <div class="container mx-auto text-center">
            <button onclick="showAdmin()" class="text-[10px] text-gray-300 uppercase tracking-widest font-bold hover:text-premium-green">Store Manager Login</button>
            
            <div id="adminArea" class="admin-panel mt-5 bg-gray-100 p-6 rounded-2xl border-2 border-dashed border-gray-300">
                <h3 class="font-black mb-4">Add New Product</h3>
                <div class="flex flex-col gap-3 max-w-xs mx-auto">
                    <input type="text" id="newProdName" placeholder="Item Name (e.g. Sugar)" class="p-2 rounded border">
                    <select id="newProdCat" class="p-2 rounded border">
                        <option value="GROCERY">Grocery</option>
                        <option value="SPICES">Spices</option>
                        <option value="CLEANING">Cleaning</option>
                    </select>
                    <button onclick="addProduct()" class="bg-premium-green text-white p-3 rounded font-black">SAVE TO LIST</button>
                </div>
            </div>
            
            <div class="mt-10 text-gray-400 text-[10px]">
                BHAVANI HYPER MART © 2026 | HYDERABAD
            </div>
        </div>
    </footer>

    <script>
        const whatsappNumber = "919182841682";
        let products = [
            { category: "GROCERY", item: "TOOR DAL" },
            { category: "GROCERY", item: "RICE 25KG" },
            { category: "SPICES", item: "CUMIN SEEDS" },
            { category: "CLEANING", item: "DISH SOAP" }
        ];

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between">
                    <div class="bg-yellow-400 text-[8px] font-black p-1 text-center uppercase tracking-tighter">SPECIAL DISCOUNTED PRICE</div>
                    <div class="p-4 flex-grow flex flex-col items-center justify-center">
                        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3 text-gray-200">
                            <i class="fas fa-shopping-bag text-2xl"></i>
                        </div>
                        <h4 class="text-xs font-black text-gray-800 text-center uppercase">${p.item}</h4>
                        <span class="text-[9px] text-gray-400 font-bold">${p.category}</span>
                    </div>
                    <div class="p-3 bg-gray-50 border-t flex justify-between items-center">
                        <span class="text-[10px] font-black text-red-600">BELOW MRP</span>
                        <a href="https://wa.me/${whatsappNumber}?text=Price%20check%20for%20${p.item}" class="bg-white border-2 border-premium-green text-premium-green px-3 py-1 rounded-md text-[10px] font-black">ADD</a>
                    </div>
                </div>
            `).join('');
        }

        function showAdmin() {
            const pass = prompt("Enter Manager Password:");
            if(pass === "mart79") {
                document.getElementById('adminArea').style.display = "block";
                alert("Login Success! You can now add products below.");
            } else {
                alert("Wrong password!");
            }
        }

        function addProduct() {
            const name = document.getElementById('newProdName').value.toUpperCase();
            const cat = document.getElementById('newProdCat').value;
            if(name) {
                products.unshift({ category: cat, item: name });
                renderProducts(products);
                document.getElementById('newProdName').value = "";
                alert(name + " added successfully!");
            }
        }

        function filterItems() {
            const s = document.getElementById('itemSearch').value.toLowerCase();
            const f = products.filter(p => p.item.toLowerCase().includes(s));
            renderProducts(f);
        }

        function setCategory(cat) {
            if(cat === 'all') renderProducts(products);
            else renderProducts(products.filter(p => p.category === cat));
        }

        renderProducts(products);
    </script>
</body>
</html>
