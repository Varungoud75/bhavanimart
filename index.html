<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Wholesale Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: #ffffff; margin: 0; }
        .bg-navy { background-color: #101D36; }
        .text-navy { color: #101D36; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .product-card { border-radius: 15px; background: white; color: #101D36; transition: 0.3s; }

        .hero-banner { 
            background: linear-gradient(rgba(16, 29, 54, 0.6), rgba(16, 29, 54, 0.6)), 
                        url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
        }

        /* EXACT SEARCH BAR STYLE FROM PHOTO */
        .search-container {
            background: white; border-radius: 12px; display: flex; align-items: center;
            padding: 0 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-width: 400px; margin: 0 auto;
        }
        .search-input { width: 100%; padding: 12px 10px; border: none; outline: none; color: #101D36; font-weight: 700; font-size: 14px; }

        .cart-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
            background: white; z-index: 100; transition: 0.4s; color: #101D36;
        }
        .cart-drawer.open { right: 0; }
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; z-index: 90;
        }
        .cart-overlay.show { display: block; }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
    </style>
</head>
<body>

    <div class="sticky top-0 z-50">
        <div class="bg-red-600 py-1.5 overflow-hidden border-b border-white/10">
            <p class="animate-marquee text-white font-[900] text-[10px] uppercase tracking-tighter">
                🔥 SPECIAL DISCOUNT ON EVERY ITEM! VISIT TODAY & SAVE BIG! 🔥 
            </p>
        </div>

        <nav class="bg-navy p-4 flex justify-between items-center border-b border-gold/20">
            <div>
                <h1 class="font-[900] text-xl leading-none uppercase tracking-widest">
                    <span class="text-gold">BHAVANI</span> <span class="text-white">MART</span>
                </h1>
                <p class="text-[9px] font-bold text-white/80 uppercase mt-1 tracking-widest">+91 9182841682
                 <a href="https://www.google.com/maps/dir//Bhavani+Mart+Karmanghat" class="bg-white text-navy py-4 rounded-full text-[11px] font-[900] flex items-center justify-center gap-2 uppercase border-2 border-gold shadow-xl">📍 Directions</a>
        </div> </p>
            </div>
            <button onclick="toggleCart()" class="bg-green-600 text-white px-3 py-1.5 rounded-md font-black text-[10px] uppercase shadow-lg">CART</button>
        </nav>
    </div>

    <section class="hero-banner py-8 text-center px-4">
        <h2 class="text-2xl font-[900] text-gold uppercase mb-6 leading-none">BHAVANI HYPER MART</h2>
        <div class="search-container">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search 10,000+ items..." class="search-input">
        </div>
    </section>

    <div id="offersSection" class="hidden bg-gold p-4 text-navy shadow-inner">
        <h3 class="font-black text-xs uppercase mb-3 tracking-widest text-center border-b border-navy/20 pb-2">Today's Special Offers</h3>
        <div id="offersGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div class="p-6 text-center space-y-4 max-w-md mx-auto">
        <h3 class="text-white font-black text-lg uppercase tracking-tight">
            <span class="text-gold">TIRED OF TYPING?</span><br>
            TAKE A PHOTO OF YOUR LIST!
        </h3>
        <div class="grid grid-cols-2 gap-3 px-2">
            <a href="https://wa.me/919182841682" class="bg-gold text-navy py-4 rounded-full text-[11px] font-[900] flex items-center justify-center gap-2 uppercase shadow-xl">📸 WhatsApp List Photo</a>
            <a href="https://www.google.com/maps/dir//Bhavani+Mart+Karmanghat" class="bg-white text-navy py-4 rounded-full text-[11px] font-[900] flex items-center justify-center gap-2 uppercase border-2 border-gold shadow-xl">📍 Directions</a>
        </div>
    </div>

    <div class="bg-navy p-4 border-y border-white/10">
        <div class="flex gap-2 overflow-x-auto no-scrollbar" id="catFilters">
            <button onclick="setCategory('all')" class="bg-gold text-navy px-5 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap">All Items</button>
        </div>
    </div>

    <main class="p-2 mb-24 mt-4">
        <div id="productGrid" class="grid grid-cols-3 md:grid-cols-6 gap-2"></div>
    </main>

    <div onclick="toggleCart()" class="fixed bottom-6 right-6 bg-red-600 text-white p-4 rounded-full shadow-2xl z-[60] cursor-pointer border-2 border-white">
        <span id="cartCount" class="absolute -top-1 -right-1 bg-navy text-gold text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-white">0</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>

    <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="cart-drawer flex flex-col p-6 shadow-2xl">
        <div class="flex justify-between items-center border-b-2 pb-4 mb-4 text-navy">
            <h2 class="font-black text-xl uppercase tracking-tighter">My List</h2>
            <button onclick="toggleCart()" class="text-red-600 font-black text-xs uppercase">Close</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto no-scrollbar space-y-3"></div>
        <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase mt-4 shadow-xl">Send to WhatsApp</button>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        let allItems = [];
        let cart = JSON.parse(localStorage.getItem('bhavaniCart')) || [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    return { 
                        category: (parts[0] || '').replace(/"/g, '').trim().toUpperCase() || 'GENERAL', 
                        name: (parts[1] || '').replace(/"/g, '').trim(),
                        img: (parts[2] || '').replace(/"/g, '').trim(),
                        price: (parts[3] || '').replace(/"/g, '').trim()
                    };
                }).filter(i => i.name && i.name.length > 1);
                generateCategoryButtons();
                renderOffers();
                updateCart();
                render();
            } catch (e) { console.error("Data error"); }
        }

        function renderOffers() {
            const offerItems = allItems.filter(i => i.category.includes('OFFER'));
            const section = document.getElementById('offersSection');
            const grid = document.getElementById('offersGrid');
            if (offerItems.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = offerItems.map((i, idx) => {
                    const prices = i.price.split('/');
                    const mrp = prices[0] ? prices[0].trim() : '';
                    const disc = prices[1] ? prices[1].trim() : '';
                    return `
                        <div class="min-w-[130px] bg-white rounded-xl p-2 shadow-md text-navy flex flex-col">
                            <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" class="h-16 mx-auto object-contain mb-1">
                            <h4 class="text-[9px] font-black uppercase text-center h-6 overflow-hidden mb-1">${i.name}</h4>
                            <div class="flex flex-col items-center mb-1">
                                <span class="text-[11px] font-[900] leading-none">₹${disc || mrp}</span>
                                ${disc ? `<span class="text-[8px] text-slate-400 line-through font-medium">₹${mrp}</span>` : ''}
                            </div>
                            <button onclick="addToCart('off-${idx}', '${i.name.replace(/'/g, "\\'")}', true)" class="w-full bg-red-600 text-white py-1.5 rounded-lg text-[9px] font-black uppercase">Add</button>
                        </div>`;
                }).join('');
            }
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => !i.category.includes('OFFER') && (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));
            
            grid.innerHTML = filtered.map((i, idx) => {
                const prices = i.price.split('/');
                const mrp = prices[0] ? prices[0].trim() : '';
                const disc = prices[1] ? prices[1].trim() : '';
                return `
                <div class="product-card p-2 flex flex-col border shadow-sm">
                    <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" class="h-16 mx-auto object-contain mb-1">
                    <h4 class="text-[9px] font-[900] uppercase h-6 overflow-hidden leading-tight mb-1">${i.name}</h4>
                    <div class="flex flex-col mb-1">
                        <span class="text-[11px] font-black text-navy leading-none">₹${disc || mrp}</span>
                        ${disc ? `<span class="text-[8px] text-slate-500 line-through font-normal">₹${mrp}</span>` : ''}
                    </div>
                    <div class="space-y-1">
                        <input type="text" id="qty-prod-${idx}" placeholder="Qty" class="w-full border border-slate-200 rounded p-1 text-[8px] font-bold outline-none text-navy">
                        <button onclick="addToCart('prod-${idx}', '${i.name.replace(/'/g, "\\'")}', false)" class="w-full bg-navy text-gold py-1.5 rounded text-[8px] font-black uppercase">Add</button>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(id, name, isOffer) {
            const qtyInput = document.getElementById(`qty-${id}`);
            const qtyVal = isOffer ? "1 unit" : (qtyInput.value || "1 unit");
            cart.push({ name: name, qty: qtyVal });
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            if(qtyInput) qtyInput.value = "";
            updateCart();
            
            const btn = event.target;
            const oldTxt = btn.innerText;
            btn.innerText = "✓";
            btn.classList.add('bg-green-600');
            setTimeout(() => { btn.innerText = oldTxt; btn.classList.remove('bg-green-600'); }, 700);
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.length === 0 ? '<p class="text-center py-10 opacity-50 uppercase text-xs font-bold text-navy">Empty List</p>' : 
            cart.map((item, index) => `
                <div class="flex justify-between items-center bg-slate-100 p-2 rounded-lg border text-navy">
                    <div class="text-[9px] font-black uppercase leading-tight">${item.name}<br><span class="text-blue-600 font-bold">Qty: ${item.qty}</span></div>
                    <button onclick="removeItem(${index})" class="text-red-500 font-black px-2">✕</button>
                </div>`).join('');
        }

        function removeItem(index) { cart.splice(index, 1); localStorage.setItem('bhavaniCart', JSON.stringify(cart)); updateCart(); }
        function sendOrder() {
            if (cart.length === 0) return;
            let msg = "📦 *ORDER - BHAVANI MART*\n\n" + cart.map((item, i) => `${i+1}. *${item.name}* (${item.qty})`).join('\n');
            window.location.href = `https://wa.me/919182841682?text=${encodeURIComponent(msg)}`;
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))].filter(c => !c.includes('OFFER'));
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white/10 text-white border border-white/20 px-4 py-1.5 rounded-lg text-[9px] font-black uppercase whitespace-nowrap";
                btn.innerText = c;
                btn.onclick = (e) => {
                    activeCat = c;
                    document.querySelectorAll('#catFilters button').forEach(b => b.classList.replace('bg-gold', 'bg-white/10'));
                    e.target.classList.replace('bg-white/10', 'bg-gold');
                    render();
                };
                container.appendChild(btn);
            });
        }

        function setCategory(c) { activeCat = c; render(); }
        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('open'); document.getElementById('cartOverlay').classList.toggle('show'); }
        loadData();
    </script>
</body>
</html>
