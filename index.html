<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Wholesale Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; color: #101D36; }
        .bg-navy { background-color: #101D36; }
        .text-navy { color: #101D36; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .logo-bold { font-weight: 900 !important; letter-spacing: 0.05em; font-size: 1.8rem; }
        
        .hero-banner { 
            background: linear-gradient(rgba(16, 29, 54, 0.8), rgba(16, 29, 54, 0.8)), 
                        url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center;
        }
        .offer-card { border: 3px solid #FFD700; background: #ffffff; border-radius: 20px; min-width: 160px; }
        .product-card { border-top: 4px solid #FFD700; border-radius: 15px; background: white; transition: 0.3s; }

        .cart-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
            background: white; z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .cart-drawer.open { right: 0; }
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(16, 29, 54, 0.6); display: none; z-index: 90; backdrop-filter: blur(4px);
        }
        .cart-overlay.show { display: block; }
    </style>
</head>
<body>

    <div class="bg-red-600 text-white py-4 text-center text-sm md:text-xl font-black uppercase tracking-widest shadow-2xl">
        🔥 SPECIAL DISCOUNT ON EVERY ITEM • BELOW MRP 🔥
    </div>

    <nav class="bg-navy p-5 sticky top-0 z-50 shadow-xl flex justify-between items-center">
        <div>
            <h1 class="logo-bold leading-none uppercase">
                <span class="text-gold">BHAVANI</span> <span class="text-white">MART</span>
            </h1>
            <div class="flex gap-4 mt-1 items-center">
                <p class="text-[10px] font-bold text-white opacity-90 uppercase tracking-[0.1em]">+91 9182841682</p>
                <a href="https://maps.google.com/?q=Bhavani+Mart+3000sqft" target="_blank" class="text-gold text-[10px] font-black underline flex items-center gap-1">
                    📍 VISIT STORE
                </a>
            </div>
        </div>
        <button onclick="toggleCart()" class="bg-green-600 text-white px-4 py-2 rounded-md font-black text-[10px] shadow-lg uppercase">My List</button>
    </nav>

    <div id="offerSection" class="hidden">
        <div class="bg-gold p-8 border-b-4 border-navy">
            <h2 class="text-[#101D36] font-black text-xl uppercase tracking-tighter mb-4 text-center">
                ★ TODAY'S EXCLUSIVE OFFERS ★
            </h2>
            <div id="offersGrid" class="flex gap-4 overflow-x-auto no-scrollbar py-2"></div>
        </div>
    </div>

    <section class="hero-banner py-24 text-center text-white px-4 border-b-4 border-gold">
        <h2 class="text-5xl md:text-7xl font-[900] text-gold uppercase tracking-tighter mb-2 leading-none">BHAVANI HYPER MART</h2>
        <p class="text-lg md:text-xl font-black text-white tracking-[0.2em] uppercase mt-2">3000 SQ. FT. WHOLESALE STORE</p>
    </section>

    <div class="bg-navy p-14 text-center border-y-4 border-gold">
        <h3 class="text-gold font-black text-2xl md:text-4xl mb-8 uppercase tracking-tight leading-tight">
            TIRED OF TYPING?<br> TAKE A PHOTO OF YOUR LIST!
        </h3>
        <div class="flex flex-col md:flex-row gap-4 justify-center items-center mt-6">
    <a href="https://wa.me/919182841682?text=Hi, I want to share my list photo." class="bg-gold text-navy px-12 py-5 rounded-full text-[14px] font-black inline-block shadow-2xl uppercase tracking-widest hover:scale-105 transition-transform">
        📸 WHATSAPP PHOTO
    </a>
    
    <a href="https://www.google.com/maps/search/Bhavani+Hyper+Mart" target="_blank" class="bg-white text-navy px-12 py-5 rounded-full text-[12px] font-black inline-block shadow-2xl uppercase tracking-widest hover:scale-105 transition-transform border-2 border-gold">
        📍 GET DIRECTIONS
    </a>
</div>

    <div class="bg-white sticky top-[88px] z-40 border-b p-4 shadow-md text-center">
        <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search items (Rice, Soap, Oil...)" class="w-full bg-slate-100 p-4 rounded-xl border-2 border-slate-200 text-sm mb-4 outline-none focus:border-navy font-bold">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="catFilters">
            <button onclick="setCategory('all')" class="bg-navy text-gold px-6 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap">All Items</button>
        </div>
    </div>

    <main class="container mx-auto p-2 py-8 mb-20">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-2 px-1"></div>
    </main>

    <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="cart-drawer flex flex-col p-6">
        <div class="flex justify-between items-center border-b-2 pb-4 mb-4">
            <h2 class="font-[900] text-2xl uppercase tracking-tighter">My Shopping List</h2>
            <button onclick="toggleCart()" class="text-red-600 font-black text-sm uppercase">Close</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto no-scrollbar space-y-4"></div>
        <div class="border-t-2 pt-6 mt-4">
            <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-[900] uppercase tracking-widest shadow-xl">
                Send List to WhatsApp
            </button>
        </div>
    </div>

    <div onclick="toggleCart()" class="fixed bottom-6 right-6 bg-red-600 text-white p-5 rounded-full shadow-2xl z-[60] cursor-pointer hover:scale-110 transition-transform">
        <span id="cartCount" class="absolute -top-1 -right-1 bg-navy text-gold text-[10px] font-black px-2 py-1 rounded-full border-2 border-white">0</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        
        let allItems = [];
        // NEW: Load cart from Local Storage so it doesn't vanish
        let cart = JSON.parse(localStorage.getItem('bhavaniCart')) || [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    const rawPrice = parts[3]?.replace(/"/g, '').trim() || '';
                    let mrp = '', offer = rawPrice;
                    if (rawPrice.includes('/')) {
                        const splitPrice = rawPrice.split('/');
                        mrp = splitPrice[0].trim();
                        offer = splitPrice[1].trim();
                    }
                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase(), 
                        name: parts[1]?.replace(/"/g, '').trim(),
                        img: parts[2]?.replace(/"/g, '').trim(),
                        mrp: mrp, offer: offer
                    };
                }).filter(i => i.name && i.name.length > 1);

                renderOffers();
                generateCategoryButtons();
                updateCart();
                render();
            } catch (e) { console.error("Data error"); }
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('open');
            document.getElementById('cartOverlay').classList.toggle('show');
        }

        function addToCart(id, name, isOffer = false) {
            const qtyVal = document.getElementById(`qty-${id}`).value || '1 unit';
            cart.push({ name: name, qty: qtyVal });
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            updateCart();
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Added ✓";
            setTimeout(() => { btn.innerText = originalText; }, 800);
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            cartCount.innerText = cart.length;
            
            if (cart.length === 0) {
                cartItems.innerHTML = `<p class="text-slate-400 text-center mt-10 font-bold uppercase text-xs">Your list is empty</p>`;
                return;
            }

            cartItems.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border">
                    <div class="flex-grow">
                        <p class="font-black text-[12px] uppercase">${item.name}</p>
                        <p class="text-blue-600 font-bold text-xs mt-1">Requirement: ${item.qty}</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 font-black ml-4">✕</button>
                </div>
            `).join('');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('bhavaniCart', JSON.stringify(cart));
            updateCart();
        }

        function sendOrder() {
            if (cart.length === 0) return alert("Your list is empty!");
            let message = "📦 *NEW ORDER - BHAVANI MART*\n\n";
            cart.forEach((item, i) => {
                message += `${i+1}. *${item.name}* - (${item.qty})\n`;
            });
            message += `\n_Please confirm availability and total price._`;
            window.location.href = `https://wa.me/919182841682?text=${encodeURIComponent(message)}`;
        }

        function renderOffers() {
            const offers = allItems.filter(i => i.category.includes('TODAY OFFER'));
            const section = document.getElementById('offerSection');
            const grid = document.getElementById('offersGrid');

            if (offers.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = offers.map((i, idx) => `
                    <div class="offer-card p-4 shadow-lg text-center flex flex-col justify-between">
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" class="h-20 mx-auto object-contain mb-2">
                        <h4 class="text-[10px] font-black text-navy uppercase h-8 overflow-hidden">${i.name}</h4>
                        <div class="my-2">
                            <span class="text-slate-400 line-through text-[10px] font-bold mr-1">${i.mrp}</span>
                            <span class="text-red-600 font-black text-sm">${i.offer}</span>
                        </div>
                        <input type="text" id="qty-offer-${idx}" placeholder="Qty (e.g. 1kg)" class="w-full border p-1 rounded text-[10px] mb-2 font-bold text-center">
                        <button onclick="addToCart('offer-${idx}', '${i.name.replace(/'/g, "\\'")}')" class="bg-navy text-gold text-[10px] py-2 rounded font-black uppercase">Add to List</button>
                    </div>
                `).join('');
            }
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))].filter(c => c && !c.includes("TODAY OFFER"));
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-navy border-2 border-slate-200 px-5 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap";
                btn.innerText = c;
                btn.onclick = () => setCategory(c);
                container.appendChild(btn);
            });
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map((i, idx) => `
                // Replace the entire contents of the card div in your render() function with this:

<div class="product-card shadow-lg p-2 flex flex-col justify-between border h-full">
    <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
         class="h-24 md:h-28 mx-auto object-contain mb-1">
    
    <div class="flex-grow flex flex-col justify-end text-center p-1">
        <p class="text-[9px] font-black text-blue-600 uppercase mb-1 opacity-70 leading-none">${i.category}</p>
        <h4 class="text-[11px] font-[900] text-navy uppercase h-8 overflow-hidden mb-2 leading-tight">${i.name}</h4>
        
        <div class="space-y-1 mt-auto">
            <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-lg border border-slate-100">
                <span class="text-[9px] font-black uppercase px-1 text-slate-500">Qty</span>
                <input type="text" id="qty-prod-${idx}" placeholder="e.g. 2kg, 5 packets" 
                       class="w-full bg-white p-1 rounded-md text-[10px] font-bold outline-none text-center">
            </div>

            <button onclick="addToCart('prod-${idx}', '${i.name.replace(/'/g, "\\'")}')" 
                    class="block w-full bg-navy text-gold py-1.5 rounded-xl text-[10px] font-black text-center uppercase shadow-md leading-none">
                Add to List
            </button>
        </div>
    </div>
</div>
            `).join('');
        }

        function setCategory(c) { activeCat = c; render(); }
        loadData();
    </script>
</body>
</html>
